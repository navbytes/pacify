name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format (Biome)
        run: bun run check:ci

      - name: Type check (svelte-check)
        run: bun run check

      - name: Security audit
        run: bun audit --audit-level=high

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Locale parity is asserted by the unit suite
      # (src/services/i18n/__tests__/localeParity.test.ts), so a separate
      # locale-validation step is unnecessary here.
      - name: Unit tests with coverage
        run: bun run test:coverage

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build

      - name: Validate manifest
        run: |
          jq empty dist/manifest.json
          for field in manifest_version name version; do
            jq -e ".${field}" dist/manifest.json > /dev/null \
              || { echo "manifest.json is missing required field: ${field}"; exit 1; }
          done
          [ "$(jq -r .manifest_version dist/manifest.json)" = "3" ] \
            || { echo "manifest_version must be 3"; exit 1; }
          [ -f dist/_locales/en/messages.json ] \
            || { echo "default locale messages missing from dist"; exit 1; }

      - name: Check version sync
        run: |
          # package.json and manifest.json must agree, or the released zip
          # carries a different version than the tag release-please cut.
          PKG=$(jq -r .version package.json)
          MAN=$(jq -r .version manifest.json)
          [ "$PKG" = "$MAN" ] \
            || { echo "version mismatch: package.json=$PKG manifest.json=$MAN"; exit 1; }

      - name: Enforce bundle size budget
        run: |
          # Hard-fail on any single JS bundle over 1MB — well under store
          # limits, and a regression signal long before users feel it.
          oversized=$(find dist -name '*.js' -size +1M)
          if [ -n "$oversized" ]; then
            echo "JS bundles over the 1MB budget:"
            ls -lh $oversized
            exit 1
          fi

      - name: Package store zip
        run: |
          cd dist
          zip -qr ../pacify-extension.zip . -x '*.map' -x '*.DS_Store'
          cd ..
          if unzip -l pacify-extension.zip | grep -q '\.map$'; then
            echo "source maps must not ship in the store zip"
            exit 1
          fi
          size=$(stat -c%s pacify-extension.zip)
          echo "Store zip size: $((size / 1024)) KB"
          if [ "$size" -gt $((10 * 1024 * 1024)) ]; then
            echo "store zip exceeds the 10MB budget"
            exit 1
          fi

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: pacify-extension
          path: pacify-extension.zip
          retention-days: 14

      # Unzipped build for the E2E job (and for sideloading via
      # chrome://extensions → Load unpacked).
      - name: Upload dist for E2E
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    env:
      CI: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright system dependencies
        # Pulls in the shared libraries Chromium-family browsers need on CI.
        run: bunx playwright install-deps chromium

      - name: Install Chrome for Testing
        # MV3 extension service workers don't start reliably under plain Chromium
        # headless (what setup-chrome / Playwright's bundle provide). Install real
        # Chrome for Testing — the exact browser the suite passes against locally.
        run: |
          bunx @puppeteer/browsers install chrome@stable --path "$HOME/.cache/puppeteer"
          CHROME_BIN=$(find "$HOME/.cache/puppeteer/chrome" -type f -name chrome -path '*chrome-linux64*' | head -1)
          if [ -z "$CHROME_BIN" ]; then echo "Failed to locate Chrome for Testing binary" >&2; exit 1; fi
          chmod +x "$CHROME_BIN"
          echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"
          echo "Using Chrome at: $CHROME_BIN"

      - name: Download built extension
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run E2E tests
        run: bun run test:e2e:ci

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
