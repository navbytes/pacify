name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Maintains a rolling "release" PR from conventional commits. Merging
      # that PR bumps package.json + manifest.json and updates CHANGELOG.md;
      # the manifest.json change then triggers release.yml, which owns the
      # tag, GitHub Release, store zip, and Chrome Web Store upload.
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
