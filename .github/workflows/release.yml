name: Create Release

# Auto-releases when the version in manifest.json changes on main (i.e. the
# release-please PR is merged), and can also be triggered manually. The
# tag-existence guard makes it idempotent: re-runs for an already-released
# version are a no-op rather than a duplicate/failed release.
on:
  push:
    branches: [main]
    paths: ['manifest.json'] # version bumps land here
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # create the tag + GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether this version is already released
        id: guard
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.version.outputs.VERSION }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.guard.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        if: steps.guard.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Unit tests
        if: steps.guard.outputs.exists == 'false'
        run: bun run test

      - name: Build
        if: steps.guard.outputs.exists == 'false'
        run: bun run build

      - name: Package store zip
        if: steps.guard.outputs.exists == 'false'
        run: |
          cd dist
          zip -qr "../Pacify_${{ steps.version.outputs.VERSION }}.zip" . -x '*.map' -x '*.DS_Store'
          cd ..
          if unzip -l "Pacify_${{ steps.version.outputs.VERSION }}.zip" | grep -q '\.map$'; then
            echo "source maps must not ship in the store zip"
            exit 1
          fi
          ls -lh "Pacify_${{ steps.version.outputs.VERSION }}.zip"

      - name: Extract release notes from CHANGELOG.md
        if: steps.guard.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk -v version="$VERSION" '
            /^## \[/ { if (found) exit }
            found { print }
            $0 ~ "^## \\[" version "\\]" { found=1 }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.guard.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ${{ steps.notes.outputs.NOTES }}

            ## Installation

            1. Download `Pacify_${{ steps.version.outputs.VERSION }}.zip` below and extract it
            2. Open `chrome://extensions/`, enable **Developer mode**
            3. Click **Load unpacked** and select the extracted folder
          files: Pacify_${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false

      # Chrome Web Store submission is deliberately NOT part of this
      # workflow — it is a manual, human-triggered step. Run the
      # "Publish to Chrome Web Store" workflow (publish-cws.yml) from the
      # Actions tab when ready to submit this release to the store.
      - name: Note manual store publish step
        if: steps.guard.outputs.exists == 'false'
        run: |
          {
            echo "## Next step: Chrome Web Store"
            echo ""
            echo "Release v${{ steps.version.outputs.VERSION }} is on GitHub."
            echo "Store submission is manual: run the **Publish to Chrome Web Store**"
            echo "workflow from the Actions tab when ready."
          } >> "$GITHUB_STEP_SUMMARY"
